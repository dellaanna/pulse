name: Pulse - Daily Summary Bot

on:
  schedule:
    - cron: '30 1 * * *' # Fires at 7:00 AM IST every single morning
  push:
    branches:
      - main           # Fires instantly on every single code push
  workflow_dispatch:   # Manual button trigger

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code files
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---------------------------------------------------
      # ROUTE A: EMAIL DISPATCHER (Runs on Manual Button & Schedule)
      # ---------------------------------------------------
      - name: Execute 7:00 AM Dashboard Dispatcher
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          RUN_MODE: "SUMMARY"
          EMAIL_SENDER: "dellaannag04@gmail.com"
          EMAIL_RECEIVER: "dellaannag04@gmail.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          WEATHER_API_KEY: "d47ba91e5dbbe1a99ce57129ffc19579"
        run: python bot.py

      # ---------------------------------------------------
      # ROUTE B: PORTFOLIO REBUILDER (Only runs automatically on a real code PUSH)
      # ---------------------------------------------------
      - name: Execute Live Repository Portfolio Sync
        if: github.event_name == 'push'
        env:
          RUN_MODE: "SYNC"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bot.py
