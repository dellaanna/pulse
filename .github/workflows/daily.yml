name: Pulse - Daily Summary Bot

on:
  schedule:
    - cron: '15 8 * * *' # Scheduled for 1:45 PM IST (8:15 AM UTC)
  workflow_dispatch:

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pulse bot
        env:
          EMAIL_SENDER: "dellaannag04@gmail.com"
          EMAIL_RECEIVER: "dellaannag04@gmail.com"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # INJECTING THE NEW KEY HERE:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python bot.py
