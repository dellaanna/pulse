name: Pulse - Daily Summary Bot

on:
  schedule:
    - cron: '30 13 * * *' # Scheduled for 7:00 PM IST (1:30 PM UTC) everyday
  workflow_dispatch:

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pulse bot
        env:
          # PLUG YOUR EMAIL IDS DIRECTLY HERE:
          EMAIL_SENDER: "dellaannag04@gmail.com"
          EMAIL_RECEIVER: "dellaannag04@gmail.com"
          
          # SECURE VAULT PASSWORD CALL:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          
          # BYPASS GLITCH: Paste your OpenWeatherMap key inside the quotes below
          WEATHER_API_KEY: "d47ba91e5dbbe1a99ce57129ffc19579"
        run: python bot.py

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt
